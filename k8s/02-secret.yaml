# 02-secret.yaml
#
# IMPORTANT: this file is a TEMPLATE. the values below are placeholders,
# NOT real secrets. in a real GitOps setup you would not commit plain
# Secret manifests with real values to git at all - you'd use something
# like Sealed Secrets, SOPS, or an External Secrets Operator pointing at
# a real secret manager (AWS Secrets Manager, Vault, etc). for this
# assignment, generate your own values and apply this manually /
# through a secret management tool instead of committing real creds.
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secrets
  namespace: taskflow
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_A_LONG_RANDOM_STRING"
  ADMIN_SIGNUP_CODE: "REPLACE_WITH_YOUR_OWN_ADMIN_INVITE_CODE"
  SMTP_HOST: ""
  SMTP_PORT: ""
  SMTP_USER: ""
  SMTP_PASS: ""
