apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  APP_NAME: "TaskFlow"
  NODE_ENV: "production"
  PORT: "5000"
  MONGODB_URI: "mongodb://taskflow-mongo:27017/taskflow"
  REDIS_URL: "redis://taskflow-redis:6379"
  TASK_QUEUE_NAME: "taskflow:task-queue"
  JWT_EXPIRES_IN: "7d"
  BRPOP_TIMEOUT: "5"
  # replace with your real domain once ingress/DNS is set up
  CLIENT_URL: "http://taskflow.local"
